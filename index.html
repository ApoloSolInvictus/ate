<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATE Costa Rica | Especialistas en Frenos de Alto Rendimiento</title>
    <meta name="description" content="Centro de servicio especializado en sistemas de frenos automotrices. Precisión alemana y seguridad absoluta en Costa Rica.">
    
    <!-- Librerías de Diseño e Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- React Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuración Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        ate: {
                            blue: '#004b87',       // Azul clásico ATE
                            blueDark: '#00284d',
                            yellow: '#ffb81c',     // Amarillo de alerta/frenos
                            dark: '#0f172a',
                            light: '#f8fafc'
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; color: #334155; }
        .hero-pattern {
            background-color: #0f172a;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231e293b' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .btn-hover-effect { transition: all 0.3s ease; }
        .btn-hover-effect:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0, 75, 135, 0.4); }
        
        /* Ajuste para que el menú móvil no tape contenido */
        .mobile-menu-overlay { z-index: 40; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const whatsappNumber = "50688888888"; // Número del cliente
            const whatsappMessage = encodeURIComponent("Hola ATE Costa Rica, me gustaría cotizar una revisión de frenos para mi vehículo.");

            // Efecto Navbar Transparente a Sólido
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {/* NAVEGACIÓN */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white shadow-md py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            {/* Logo */}
                            <a href="#" className="flex items-center gap-3 group">
                                <div className="w-12 h-12 bg-ate-blue text-white font-display font-black text-2xl italic flex items-center justify-center rounded-sm transform group-hover:scale-105 transition shadow-lg">
                                    ATE
                                </div>
                                <div className="flex flex-col">
                                    <span className={`font-display font-black text-xl tracking-tight leading-none ${scrolled ? 'text-ate-dark' : 'text-white'}`}>
                                        COSTA RICA
                                    </span>
                                    <span className={`font-sans text-[10px] uppercase tracking-[0.2em] font-bold ${scrolled ? 'text-ate-blue' : 'text-ate-yellow'}`}>
                                        Frenos Premium
                                    </span>
                                </div>
                            </a>

                            {/* Enlaces Desktop */}
                            <div className={`hidden md:flex items-center gap-10 font-medium text-sm ${scrolled ? 'text-slate-600' : 'text-slate-100'}`}>
                                <a href="#servicios" className="hover:text-ate-yellow transition">Especialidades</a>
                                <a href="#nosotros" className="hover:text-ate-yellow transition">Por qué ATE</a>
                                <a href="#contacto" className="hover:text-ate-yellow transition">Contacto</a>
                            </div>

                            {/* Botón CTA Desktop */}
                            <div className="hidden md:block">
                                <a 
                                    href={`https://wa.me/${whatsappNumber}?text=${whatsappMessage}`} 
                                    target="_blank"
                                    className="px-6 py-3 bg-ate-yellow text-ate-dark font-bold rounded-lg text-sm btn-hover-effect flex items-center gap-2 shadow-lg"
                                >
                                    <i className="ph-fill ph-whatsapp text-xl"></i> Cita de Revisión
                                </a>
                            </div>

                            {/* Botón Menú Móvil */}
                            <button className="md:hidden text-3xl p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i className={`ph ${isMenuOpen ? 'ph-x' : 'ph-list'} ${scrolled ? 'text-ate-dark' : 'text-white'}`}></i>
                            </button>
                        </div>

                        {/* Menú Desplegable Móvil */}
                        {isMenuOpen && (
                            <div className="md:hidden absolute top-full left-0 w-full bg-white shadow-2xl flex flex-col p-6 space-y-6 font-medium text-slate-800 mobile-menu-overlay border-t border-slate-100">
                                <a href="#servicios" className="text-lg" onClick={()=>setIsMenuOpen(false)}>Especialidades</a>
                                <a href="#nosotros" className="text-lg" onClick={()=>setIsMenuOpen(false)}>Por qué ATE</a>
                                <a href="#contacto" className="text-lg" onClick={()=>setIsMenuOpen(false)}>Contacto & Ubicación</a>
                                <a 
                                    href={`https://wa.me/${whatsappNumber}?text=${whatsappMessage}`} 
                                    target="_blank"
                                    className="px-6 py-4 mt-4 bg-ate-blue text-white font-bold rounded-xl text-center flex justify-center items-center gap-2 shadow-lg"
                                >
                                    <i className="ph-fill ph-whatsapp text-2xl"></i> Hablar por WhatsApp
                                </a>
                            </div>
                        )}
                    </nav>

                    {/* SECCIÓN HERO (Intro) */}
                    <section className="relative min-h-[90vh] flex items-center pt-32 pb-20 overflow-hidden bg-ate-dark">
                        {/* Imagen de Fondo: Frenos Deportivos */}
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1625227301646-60fb85c5bdc2?q=80&w=2000&auto=format&fit=crop" 
                                alt="Caliper de Freno Deportivo" 
                                className="w-full h-full object-cover object-center opacity-80"
                            />
                            {/* Gradiente Oscuro para legibilidad */}
                            <div className="absolute inset-0 bg-gradient-to-r from-slate-900 via-slate-900/90 to-slate-900/40"></div>
                        </div>

                        <div className="relative z-10 max-w-7xl mx-auto px-6 w-full">
                            <div className="max-w-3xl animate-fade-in-up">
                                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-ate-blue/30 border border-ate-blue/50 text-blue-200 text-xs font-bold uppercase tracking-widest mb-8 backdrop-blur-sm">
                                    <i className="ph-fill ph-check-circle text-ate-yellow text-lg"></i> Centro de Servicio Autorizado
                                </div>
                                
                                <h1 className="text-5xl md:text-7xl lg:text-8xl font-display font-black text-white leading-[1.1] mb-8">
                                    Poder Absoluto.<br/>
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-ate-yellow to-yellow-200">
                                        Frenado Perfecto.
                                    </span>
                                </h1>
                                
                                <p className="text-lg md:text-xl text-slate-300 mb-12 leading-relaxed max-w-2xl font-light">
                                    Tu seguridad no es negociable. Reemplazamos, rectificamos y optimizamos tu sistema de frenos con repuestos <strong className="text-white">originales ATE y precisión alemana</strong>. Siente la diferencia en cada curva.
                                </p>
                                
                                <div className="flex flex-col sm:flex-row gap-5">
                                    <a 
                                        href={`https://wa.me/${whatsappNumber}?text=${whatsappMessage}`} 
                                        target="_blank"
                                        className="px-8 py-5 bg-ate-blue hover:bg-blue-600 text-white font-bold rounded-xl transition shadow-[0_10px_30px_rgba(0,75,135,0.5)] flex items-center justify-center gap-3 text-lg"
                                    >
                                        <i className="ph-fill ph-calendar-check text-2xl"></i> Agendar Revisión
                                    </a>
                                    <a 
                                        href="#servicios" 
                                        className="px-8 py-5 bg-transparent border-2 border-slate-500 hover:border-white text-white font-bold rounded-xl transition flex items-center justify-center text-lg"
                                    >
                                        Ver Servicios
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN BENEFICIOS RÁPIDOS */}
                    <section className="bg-white py-16 border-b border-slate-200 relative z-20 -mt-10 mx-4 md:mx-auto max-w-6xl rounded-2xl shadow-2xl">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-10 px-8 lg:px-12">
                            <div className="flex flex-col md:flex-row items-center md:items-start text-center md:text-left gap-5">
                                <div className="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center text-ate-blue shrink-0 border border-slate-100 shadow-sm">
                                    <i className="ph-fill ph-shield-check text-4xl"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-2">Pastillas Originales</h3>
                                    <p className="text-sm text-slate-500 leading-relaxed">Cerámica de alta tecnología para un frenado silencioso y sin polvo en los aros.</p>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row items-center md:items-start text-center md:text-left gap-5">
                                <div className="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center text-ate-blue shrink-0 border border-slate-100 shadow-sm">
                                    <i className="ph-fill ph-disc text-4xl"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-2">Discos de Precisión</h3>
                                    <p className="text-sm text-slate-500 leading-relaxed">Rectificación computarizada e instalación de discos ATE de alto rendimiento.</p>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row items-center md:items-start text-center md:text-left gap-5">
                                <div className="w-16 h-16 rounded-2xl bg-slate-50 flex items-center justify-center text-ate-blue shrink-0 border border-slate-100 shadow-sm">
                                    <i className="ph-fill ph-drop text-4xl"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-2">Líquidos Premium</h3>
                                    <p className="text-sm text-slate-500 leading-relaxed">Purgado total con líquido ATE SL.6 (DOT 4) especial para sistemas ABS modernos.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN SOBRE NOSOTROS (Con Galería de Frenos) */}
                    <section id="nosotros" className="py-24 md:py-32 bg-slate-50 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">
                            
                            {/* Textos y Argumentos */}
                            <div className="order-2 lg:order-1">
                                <h2 className="text-sm font-bold text-ate-blue uppercase tracking-widest mb-4">¿Por qué elegirnos?</h2>
                                <h3 className="text-4xl md:text-5xl font-display font-black text-ate-dark mb-8 leading-tight">Expertos en lo único que detiene tu auto.</h3>
                                
                                <p className="text-slate-600 mb-6 text-lg leading-relaxed">
                                    Muchos talleres hacen "de todo un poco". Nosotros nos obsesionamos con una sola cosa: <strong>Tu sistema de frenos.</strong>
                                </p>
                                <p className="text-slate-600 mb-10 text-lg leading-relaxed">
                                    Contamos con el respaldo de ATE (Alemania), permitiéndonos ofrecer diagnósticos certeros, repuestos de fábrica y herramientas que los talleres genéricos no poseen.
                                </p>

                                <ul className="space-y-6 mb-12">
                                    <li className="flex items-start gap-4">
                                        <div className="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center mt-1 shrink-0"><i className="ph-fill ph-check-circle text-xl"></i></div>
                                        <div>
                                            <h4 className="font-bold text-slate-800">Diagnóstico Computarizado ABS</h4>
                                            <p className="text-slate-500 text-sm mt-1">Escaneamos sensores y módulos de control para garantizar que la electrónica responda.</p>
                                        </div>
                                    </li>
                                    <li className="flex items-start gap-4">
                                        <div className="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center mt-1 shrink-0"><i className="ph-fill ph-check-circle text-xl"></i></div>
                                        <div>
                                            <h4 className="font-bold text-slate-800">Garantía por Escrito</h4>
                                            <p className="text-slate-500 text-sm mt-1">Tu inversión está protegida. Si instalamos ATE, garantizamos calidad sin ruidos ni vibraciones.</p>
                                        </div>
                                    </li>
                                </ul>

                                <a href={`https://wa.me/${whatsappNumber}`} className="inline-flex px-8 py-4 bg-ate-dark text-white font-bold rounded-xl hover:bg-slate-800 transition shadow-lg items-center gap-2">
                                    Solicitar Inspección <i className="ph ph-arrow-right-bold"></i>
                                </a>
                            </div>

                            {/* Galería de Imágenes (Frenos Reales) */}
                            <div className="order-1 lg:order-2 grid grid-cols-2 gap-4 relative">
                                <div className="absolute -inset-4 bg-ate-blue/5 rounded-3xl transform rotate-3 -z-10"></div>
                                <img 
                                    src="https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?q=80&w=1000&auto=format&fit=crop" 
                                    alt="Mecánico instalando frenos" 
                                    className="w-full h-64 object-cover rounded-2xl shadow-lg mt-8"
                                />
                                <img 
                                    src="https://images.unsplash.com/photo-1632823463321-c4d68bd10433?q=80&w=1000&auto=format&fit=crop" 
                                    alt="Disco de freno" 
                                    className="w-full h-80 object-cover rounded-2xl shadow-xl border-4 border-white"
                                />
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN SERVICIOS (Tarjetas Ampliadas) */}
                    <section id="servicios" className="py-24 md:py-32 bg-white">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-20 max-w-3xl mx-auto">
                                <h2 className="text-3xl md:text-5xl font-display font-black text-ate-dark mb-6">Nuestro Catálogo de Servicios</h2>
                                <p className="text-slate-500 text-lg">Mantenimiento preventivo y correctivo para vehículos livianos, SUVs y alta gama.</p>
                            </div>

                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {/* Servicio 1 */}
                                <div className="bg-slate-50 p-10 rounded-3xl border border-slate-100 hover:border-ate-blue hover:shadow-2xl transition duration-300 group flex flex-col h-full">
                                    <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-ate-dark shadow-sm group-hover:bg-ate-blue group-hover:text-white transition duration-300 mb-8">
                                        <i className="ph-fill ph-car-profile text-4xl"></i>
                                    </div>
                                    <h4 className="text-2xl font-bold text-slate-800 mb-4">Sustitución de Pastillas</h4>
                                    <p className="text-slate-600 leading-relaxed mb-8 flex-1">
                                        Instalación de pastillas ATE Ceramic. Diseñadas para durar más, generar menos polvo y proporcionar un frenado seguro en cualquier clima.
                                    </p>
                                    <a href={`https://wa.me/${whatsappNumber}`} className="text-ate-blue font-bold text-base flex items-center gap-2 hover:text-blue-700 w-fit">
                                        Cotizar Pastillas <i className="ph ph-arrow-right"></i>
                                    </a>
                                </div>

                                {/* Servicio 2 */}
                                <div className="bg-slate-50 p-10 rounded-3xl border border-slate-100 hover:border-ate-blue hover:shadow-2xl transition duration-300 group flex flex-col h-full">
                                    <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-ate-dark shadow-sm group-hover:bg-ate-blue group-hover:text-white transition duration-300 mb-8">
                                        <i className="ph-fill ph-disc text-4xl"></i>
                                    </div>
                                    <h4 className="text-2xl font-bold text-slate-800 mb-4">Discos: Torneado y Cambio</h4>
                                    <p className="text-slate-600 leading-relaxed mb-8 flex-1">
                                        ¿Sientes vibración en el volante al frenar? Rectificamos tus discos con precisión milimétrica o los reemplazamos por discos ATE originales si el desgaste es severo.
                                    </p>
                                    <a href={`https://wa.me/${whatsappNumber}`} className="text-ate-blue font-bold text-base flex items-center gap-2 hover:text-blue-700 w-fit">
                                        Revisar Discos <i className="ph ph-arrow-right"></i>
                                    </a>
                                </div>

                                {/* Servicio 3 */}
                                <div className="bg-slate-50 p-10 rounded-3xl border border-slate-100 hover:border-ate-blue hover:shadow-2xl transition duration-300 group flex flex-col h-full">
                                    <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-ate-dark shadow-sm group-hover:bg-ate-blue group-hover:text-white transition duration-300 mb-8">
                                        <i className="ph-fill ph-engine text-4xl"></i>
                                    </div>
                                    <h4 className="text-2xl font-bold text-slate-800 mb-4">Sistemas Hidráulicos</h4>
                                    <p className="text-slate-600 leading-relaxed mb-8 flex-1">
                                        El corazón del freno. Purgamos el sistema, cambiamos bombas principales, cilindros de rueda y reemplazamos el líquido de frenos completo cada 40,000 km.
                                    </p>
                                    <a href={`https://wa.me/${whatsappNumber}`} className="text-ate-blue font-bold text-base flex items-center gap-2 hover:text-blue-700 w-fit">
                                        Cotizar Servicio <i className="ph ph-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CALL TO ACTION FINAL */}
                    <section className="py-24 md:py-32 hero-pattern relative">
                        <div className="absolute inset-0 bg-gradient-to-t from-ate-dark via-transparent to-transparent opacity-80"></div>
                        <div className="max-w-4xl mx-auto px-6 text-center relative z-10">
                            <i className="ph-fill ph-warning-circle text-6xl text-ate-yellow mb-6 animate-pulse"></i>
                            <h2 className="text-4xl md:text-6xl font-display font-black text-white mb-8">No esperes a escuchar un ruido.</h2>
                            <p className="text-slate-300 mb-12 text-xl max-w-2xl mx-auto leading-relaxed">
                                Un chirrido significa que tus discos ya se están rayando. Escríbenos la marca y año de tu vehículo para darte un estimado rápido.
                            </p>
                            
                            <div className="bg-white/10 backdrop-blur-md p-3 rounded-2xl md:rounded-full flex flex-col md:flex-row items-center gap-3 max-w-2xl mx-auto w-full border border-white/20 shadow-2xl">
                                <input 
                                    type="text" 
                                    placeholder="Ej: Nissan Frontier 2020" 
                                    className="w-full bg-slate-900/50 text-white px-6 py-4 rounded-xl md:rounded-full outline-none placeholder-slate-400 focus:ring-2 focus:ring-ate-yellow"
                                    id="car-model"
                                />
                                <button 
                                    onClick={() => {
                                        const val = document.getElementById('car-model').value;
                                        const msg = val ? `Hola ATE, necesito cotizar revisión de frenos para un ${val}` : whatsappMessage;
                                        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`, '_blank');
                                    }}
                                    className="w-full md:w-auto px-10 py-4 bg-ate-yellow hover:bg-yellow-400 text-ate-dark font-black rounded-xl md:rounded-full transition flex justify-center items-center gap-2 text-lg shrink-0"
                                >
                                    Cotizar por WhatsApp <i className="ph-fill ph-whatsapp text-2xl"></i>
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer id="contacto" className="bg-slate-950 text-slate-400 py-20 border-t-4 border-ate-blue">
                        <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-4 gap-16">
                            <div className="col-span-1 md:col-span-1">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="w-10 h-10 bg-slate-800 text-white font-display font-black italic flex items-center justify-center rounded-sm">ATE</div>
                                    <span className="font-display font-bold text-white tracking-tight text-xl">COSTA RICA</span>
                                </div>
                                <p className="text-sm leading-relaxed mb-8">Precisión alemana aplicada a la seguridad de tu familia. Centro especializado en sistemas de frenado.</p>
                                <div className="flex gap-4">
                                    <a href="#" className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center hover:bg-ate-blue hover:text-white transition text-xl"><i className="ph-fill ph-facebook-logo"></i></a>
                                    <a href="#" className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center hover:bg-ate-blue hover:text-white transition text-xl"><i class="ph-fill ph-instagram-logo"></i></a>
                                </div>
                            </div>

                            <div>
                                <h4 className="text-white font-bold mb-6 uppercase text-sm tracking-widest">Contacto Directo</h4>
                                <ul className="space-y-4 text-sm">
                                    <li className="flex items-center gap-3"><i className="ph-fill ph-phone text-ate-yellow text-lg"></i> <span className="font-bold text-slate-200">+506 8888-8888</span></li>
                                    <li className="flex items-center gap-3"><i className="ph-fill ph-envelope-simple text-ate-yellow text-lg"></i> info@ate.cr</li>
                                    <li className="flex items-start gap-3"><i className="ph-fill ph-map-pin text-ate-yellow text-lg mt-0.5"></i> <span className="leading-relaxed">San José, Costa Rica.<br/>De la rotonda, 100m Este.</span></li>
                                </ul>
                            </div>

                            <div>
